name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet test
      - run: dotnet pack -c Release -o out
      # Exchange the GitHub OIDC token for a short-lived NuGet API key
      # (trusted-publishing policy "errorgap-ci" on the errorgap account).
      - uses: NuGet/login@v1
        id: login
        with:
          user: errorgap
      - run: dotnet nuget push "out/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
